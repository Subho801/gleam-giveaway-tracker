name: Gleam Giveaway Tracker

on:
  workflow_dispatch:

  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run Gleam tracker
        env:
          STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
        run: python scripts/gleam.py

      - name: Commit JSON
        run: |
          git config user.name "actions-user"
          git config user.email "actions@github.com"

          git add data/gleam-giveaways.json

          git diff --cached --quiet || git commit -m "Update Gleam giveaways"

          git push
